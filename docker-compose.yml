services:
  postgres:
    image: postgres:16-alpine
    container_name: bradlyai_postgres
    environment:
      POSTGRES_USER: bradlyai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: bradlyai
    volumes:
      - bradlyai_pgdata:/var/lib/postgresql/data
    # PostgreSQL intentionally has no host port. Reach it only from the app network.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bradlyai"]
      interval: 10s
      timeout: 5s
      retries: 5

  bradlyai-backend:
    build: .
    container_name: bradlyai_soc
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://bradlyai:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/bradlyai
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in .env}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env}
      DEMO_DATA_ENABLED: "false"
      LIVE_SIMULATION_WORKER_ACTIVE: "false"
    volumes:
      - bradlyai_data:/app/data
      - ./sigma_rules:/app/sigma_rules:ro
      - ./playbooks:/app/playbooks:ro
    restart: unless-stopped

volumes:
  bradlyai_pgdata:
    name: bradlyai_pgdata
  bradlyai_data:
    name: bradlyai_data
