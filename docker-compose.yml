version: '3.8'

services:
  bradlyai-backend:
    build: .
    container_name: bradlyai_driverless_soc
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=BradlyAI
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - bradlyai_db:/app/data
    restart: unless-stopped

volumes:
  bradlyai_db:
    name: bradlyai_db_volume
