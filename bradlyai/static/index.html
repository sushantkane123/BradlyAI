<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101826">
  <title>BradlyAI | SOC Operations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><span></span></div>
        <div><strong>BradlyAI</strong><small>SOC OPERATIONS</small></div>
        <button class="mobile-close icon-button" id="close-nav" aria-label="Close navigation">×</button>
      </div>

      <nav class="nav-list" aria-label="SOC workspace">
        <button class="nav-item active" data-page="overview" aria-current="page">
          <span class="nav-icon">⌂</span><span>Overview</span>
        </button>
        <button class="nav-item" data-page="alerts">
          <span class="nav-icon">!</span><span>Alerts</span><span class="nav-count" id="nav-alert-count">0</span>
        </button>
        <button class="nav-item" data-page="integrations">
          <span class="nav-icon">⌁</span><span>Integrations</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <p class="sidebar-label">WORKSPACE</p>
        <button class="nav-item" data-page="cases"><span class="nav-icon">▣</span><span>Cases</span><span class="nav-count" id="nav-case-count">0</span></button>
        <button class="nav-item muted" disabled title="Available in a later pilot release"><span class="nav-icon">◇</span><span>Playbooks</span></button>
        <button class="nav-item muted" disabled title="Available in a later pilot release"><span class="nav-icon">↗</span><span>Reports</span></button>
      </div>

      <div class="sidebar-footer">
        <div class="connection-state" id="connection-state">
          <span class="status-dot checking"></span>
          <span>Checking service</span>
        </div>
        <a href="/docs" target="_blank" rel="noopener">API documentation <span aria-hidden="true">↗</span></a>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <button class="icon-button mobile-menu" id="open-nav" aria-label="Open navigation">☰</button>
        <div class="breadcrumb"><span>Security Operations</span><span class="slash">/</span><strong id="page-name">Overview</strong></div>
        <div class="topbar-actions">
          <label class="time-range" for="time-range"><span>Time range</span>
            <select id="time-range">
              <option value="24">Last 24 hours</option>
              <option value="168">Last 7 days</option>
              <option value="720">Last 30 days</option>
            </select>
          </label>
          <button class="icon-button" id="refresh-button" title="Refresh workspace" aria-label="Refresh workspace">↻</button>
          <button class="user-menu" id="auth-button" aria-haspopup="dialog"><span class="user-avatar" id="user-avatar">SO</span><span id="user-name">Sign in</span><span aria-hidden="true">⌄</span></button>
        </div>
      </header>

      <main id="main-content" tabindex="-1">
        <div id="app-content" class="page-content" aria-live="polite"></div>
      </main>
    </div>
  </div>

  <div class="scrim" id="scrim" hidden></div>
  <div class="drawer" id="alert-drawer" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="drawer-title"></div>
  <div class="modal-root" id="modal-root" aria-hidden="true"></div>
  <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
