name: BradlyAI SOC Operations CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Continuous Integration // Automated Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set up Node for dashboard syntax checks
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends build-essential curl

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit bandit

    - name: Run dependency vulnerability audit
      run: pip-audit -r requirements.txt

    - name: Run high-severity source security checks
      run: bandit -r bradlyai -q -lll

    - name: Validate dashboard JavaScript syntax
      run: node --check bradlyai/static/app.js

    - name: Execute automated test suite
      run: pytest --maxfail=1 --disable-warnings -v

  docker-verify:
    name: Verify Multi-Stage Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: bradlyai-soc:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
